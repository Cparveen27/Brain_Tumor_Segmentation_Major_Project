<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>NeuroCare AI | HealthCare Chatbot</title>
    <meta name="keywords" content="brain tumor, AI detection, MRI analysis, medical chatbot">
    <meta name="description" content="AI chatbot for health-related queries.">
    <meta name="author" content="NeuroCare AI">

    <!-- Favicon -->
    <link rel="shortcut icon" href="static/images/favicon.ico" type="image/x-icon" />

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <style>
        .chat-container {
            max-width: 800px;
            margin: 50px auto;
            background: #fff;
            border-radius: 10px;
            box-shadow: 0 2px 10px rgba(172, 197, 90, 0.2);
            padding: 20px;
        }

        .chat-header {
            background: #490000;
            color: white;
            padding: 15px;
            text-align: center;
            font-size: 1.5rem;
            border-radius: 10px 10px 0 0;
        }

        .chat-box {
            height: 400px;
            overflow-y: auto;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .user {
            text-align: right;
            background: #d1e7dd;
            margin: 5px;
            padding: 10px;
            border-radius: 10px;
        }

        .assistant {
            text-align: left;
            background: #f8d7da;
            margin: 5px;
            padding: 10px;
            border-radius: 10px;
        }

        .chat-input {
            display: flex;
            padding: 10px;
            background: #fff;
            border-top: 1px solid #ddd;
        }

        .chat-input input {
            flex: 1;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            margin-right: 10px;
            font-size: 1rem;
        }

        .chat-input button {
            padding: 10px 20px;
            background: #490000;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        .chat-input button:hover {
            background: #650000;
        }

        /* For responsive design */
        @media (max-width: 768px) {
            .chat-container {
                padding: 15px;
            }

            .chat-box {
                height: 300px;
            }
        }

        .chat-box {
            word-wrap: break-word;
            white-space: pre-wrap;
        }
    </style>
</head>

<body class="bg-gray-900 text-white">

    <!-- Header -->
    <header>
        <nav class="navbar bg-gray-900 p-4 shadow-lg">
            <div class="container mx-auto flex justify-between items-center">
                <a class="navbar-brand" href="{{url_for('home')}}">
                    <img src="static/images/logo.png" alt="NeuroCare AI" class="h-10">
                </a>
                <div class="flex items-center space-x-4">
                    <a class="nav-link text-white" href="{{url_for('home')}}">Home</a>
                    <a class="nav-link text-white" href="{{url_for('prediction')}}">Prediction</a>
                    <a class="nav-link text-white" href="{{url_for('history_prediction')}}">View History</a>
                    <a class="nav-link text-white" href="{{url_for('accuracy_page')}}">Performance Metrics</a>
                    <a class="nav-link text-white active" href="{{url_for('chatbot')}}">Chatbot</a>
                    <a class="nav-link text-white" href="{{url_for('index')}}">Logout</a>
                </div>
            </div>
        </nav>
    </header>

    <!-- Chatbot Section -->
    <section class="chat-container">
        <div class="chat-header">
            <h2>HealthCare Chatbot</h2>
        </div>

        <div id="chat-box" class="chat-box">
            <!-- Messages will appear here -->
        </div>

        <div class="chat-input">
            <input type="text" id="user-input" placeholder="How may I help you today?" class="input-field" style="color: black;">
            <button id="send-button">Send</button>
        </div>
    </section>

    <script>
        const chatBox = document.getElementById('chat-box');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');

        // Display a new message in the chat box
        function displayMessage(role, message) {
            const messageDiv = document.createElement('div');
            messageDiv.className = role;

            if (role === 'assistant') {
                messageDiv.innerHTML = message;
            } else {
                messageDiv.textContent = message;
            }

            chatBox.appendChild(messageDiv);
            chatBox.scrollTop = chatBox.scrollHeight;  // Scroll to the bottom
        }

        sendButton.addEventListener('click', async () => {
            const message = userInput.value.trim();
            if (message) {
                // Display the user's message
                displayMessage('user', message);
                userInput.value = ''; // Clear input after sending

                // Send the message to the backend using fetch API
                const response = await fetch('/send_message', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                displayMessage('assistant', data.response); // Display assistant's response
            }
        });

        // Allow pressing Enter to send the message
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                sendButton.click();  // Simulate button click
            }
        });
    </script>

</body>
</html>
